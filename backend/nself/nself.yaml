project: nchat
title: "ɳChat"
description: "Self-hosted team communication platform built on nSelf"
version: "1.0.9"

# ─────────────────────────────────────────────────────────────────────────────
# Optional Services
# Required services (PostgreSQL, Hasura, Auth, Nginx) are always on.
# ─────────────────────────────────────────────────────────────────────────────
services:
  redis:
    enabled: true
    # Redis stores presence data, typing indicators, and rate-limit counters.
  meilisearch:
    enabled: true
    # Full-text message search. Indexes on insert via the chat plugin.
  minio:
    enabled: true
    # Object storage for file uploads and recording egress output.
  mailpit:
    enabled: true
    # Local SMTP trap for auth emails in development.

# ─────────────────────────────────────────────────────────────────────────────
# Plugins
#
# These plugins are part of the nChat bundle. They require a nSelf Basic
# license ($0.99/mo or $9.99/yr). Set your key before installing:
#
#   nself license set nself_pro_xxxxxxxxxxxxxxxxxxxxxxxx
#   nself plugin install chat livekit recording moderation bots realtime auth
#   nself build && nself start
#
# Without a license key only the free core messaging surface is active.
# All pro features degrade gracefully — buttons hide, the app never crashes.
# ─────────────────────────────────────────────────────────────────────────────
plugins:
  required:
    - name: chat
      bundle: nchat
      tier: basic
      description: "Core message store hooks, channel management, and delivery status"

    - name: livekit
      bundle: nchat
      tier: basic
      description: "WebRTC voice and video calls via LiveKit"

    - name: recording
      bundle: nchat
      tier: basic
      description: "Call and screen-share recording with storage egress (requires livekit)"

    - name: moderation
      bundle: nchat
      tier: basic
      description: "AI-assisted and rule-based message filtering with auto-ban thresholds"

    - name: bots
      bundle: nchat
      tier: basic
      description: "Programmable bot accounts and slash-command runtime"

    - name: realtime
      bundle: nchat
      tier: basic
      description: "Presence, typing indicators, and live cursor sync over WebSocket"

    - name: auth
      bundle: nchat
      tier: basic
      description: "SSO, LDAP, and SAML extensions on top of the base Nhost Auth service"

custom_services: []

# ─────────────────────────────────────────────────────────────────────────────
# env_example — Plugin env vars required for full nChat feature surface
#
# Copy relevant vars to your .env file and supply values.
# Vars marked GENERATED are written automatically by `nself plugin install`.
# Vars marked REQUIRED must be provided by the operator.
# ─────────────────────────────────────────────────────────────────────────────
env_example:

  # License key — required to install all nChat bundle plugins
  NSELF_PLUGIN_LICENSE_KEY: "nself_pro_xxxxxxxxxxxxxxxxxxxxxxxx"   # REQUIRED — Basic tier ($9.99/yr)

  # livekit plugin — WebRTC voice and video calls
  LIVEKIT_URL: "wss://livekit.${BASE_DOMAIN}"                      # REQUIRED for voice/video
  LIVEKIT_API_KEY: ""                                               # GENERATED by `nself plugin install livekit`
  LIVEKIT_API_SECRET: ""                                            # GENERATED by `nself plugin install livekit`
  NEXT_PUBLIC_LIVEKIT_URL: "${LIVEKIT_URL}"                        # frontend feature-detect

  # recording plugin — call and screen-share recording (requires livekit)
  RECORDING_EGRESS_ENABLED: "true"
  RECORDING_STORAGE_BUCKET: "recordings"
  NEXT_PUBLIC_RECORDING_ENABLED: "true"

  # moderation plugin — AI + rule-based message filtering
  MODERATION_PROVIDER: "auto"                                       # auto | openai | local
  MODERATION_AUTO_BAN_THRESHOLD: "0.9"
  NEXT_PUBLIC_MODERATION_ENABLED: "true"

  # bots plugin — programmable bot accounts + slash-command runtime
  BOTS_RUNTIME: "node"                                              # node | wasm
  BOTS_MAX_CONCURRENT: "16"
  NEXT_PUBLIC_BOTS_ENABLED: "true"

  # realtime plugin — presence, typing indicators, live cursor sync
  REALTIME_PORT: "7001"
  REALTIME_MAX_CONNECTIONS: "10000"
  NEXT_PUBLIC_REALTIME_URL: "wss://realtime.${BASE_DOMAIN}"

  # auth plugin (pro extension) — SSO, LDAP, SAML, MFA enforcement
  AUTH_SSO_ENABLED: "false"
  AUTH_LDAP_URL: ""                                                 # REQUIRED if LDAP enabled
  AUTH_SAML_METADATA_URL: ""                                        # REQUIRED if SAML enabled
  NEXT_PUBLIC_AUTH_SSO_ENABLED: "false"
